name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-app-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  build-website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  build-tauri:
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    defaults:
      run:
        working-directory: app
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            fnn_triple: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            fnn_triple: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            fnn_triple: x86_64-unknown-linux-gnu
            rust_target: ""
          - platform: ubuntu-22.04-arm
            args: ""
            fnn_triple: aarch64-unknown-linux-gnu
            rust_target: ""
          - platform: windows-latest
            args: ""
            fnn_triple: x86_64-pc-windows-msvc
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        # defaults.run.working-directory does not apply to rustup here; keep repo root
        working-directory: .
        run: rustup target add ${{ matrix.rust_target }}

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf \
            rpm \
            file \
            xdg-utils

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./app/src-tauri -> target
          prefix-key: v1-rust-${{ matrix.fnn_triple }}

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Fetch fnn sidecar binary
        run: bun run fetch-fnn -- --triple ${{ matrix.fnn_triple }}

      - name: Verify updater signing secret
        shell: bash
        working-directory: .
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add the contents of app/src-tauri/.updater/fiber-studio.key as a repository secret. See README.md → Publishing a desktop release."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
