# Build signed updater artifacts and publish a GitHub Release on tag push.
#
# Setup (once):
#   1. Generate keys locally:
#        CI=true bun tauri signer generate -w src-tauri/.updater/fiber-studio.key -f --password=""
#   2. Public key is already in src-tauri/tauri.conf.json (safe to commit).
#   3. Add GitHub repo secret TAURI_SIGNING_PRIVATE_KEY with the private key file contents.
#
# Release:
#   1. Bump version in package.json, src-tauri/tauri.conf.json, src-tauri/Cargo.toml.
#   2. Commit and push to main.
#   3. git tag v0.1.0 && git push origin v0.1.0
#
# tauri-action uploads installers, updater bundles, signatures, and latest.json.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            fnn_triple: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            fnn_triple: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-latest
            args: ""
            fnn_triple: x86_64-unknown-linux-gnu
            rust_target: ""
          - platform: windows-latest
            args: ""
            fnn_triple: x86_64-pc-windows-msvc
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - name: Fetch fnn sidecar binary
        run: bun run fetch-fnn -- --triple ${{ matrix.fnn_triple }}

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fiber Studio ${{ github.ref_name }}
          prerelease: ${{ github.ref_name != 'v1.0.0' }}
          releaseBody: |
            ## Fiber Studio ${{ github.ref_name }}

            **Unsigned app installers with signed in-app updates.** Wallet, Channels, and Network flows continue in M2.

            ### Install
            - **macOS:** pick the `.dmg` for your chip (Apple Silicon or Intel). Right-click → Open if Gatekeeper warns.
            - **Windows:** use the `.exe` or `.msi`. SmartScreen may warn on unsigned builds.
            - **Linux:** `.AppImage`, `.deb`, or `.rpm`.

            ### In-app updates
            Installed copies check GitHub Releases for updates automatically on launch. You can also use **Settings → Updates**.

            ### M1 scope
            - Guided setup, node start/stop, logs, home dashboard
            - Official fnn v0.8.1 bundled locally
          args: ${{ matrix.args }}
