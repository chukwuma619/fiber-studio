# Build Tauri installers on tag push and attach them to a GitHub Release.
#
# Usage:
#   1. Bump version in package.json, src-tauri/tauri.conf.json, and src-tauri/Cargo.toml.
#   2. Commit and push to main.
#   3. Tag and push: git tag v0.1.0 && git push origin v0.1.0
#
# Tags matching v* trigger this workflow. Versions below v1.0.0 are published as pre-releases.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - run: bun run fetch-fnn -- --triple aarch64-apple-darwin

      - run: bun run tauri build

      - name: Upload macOS bundles (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: fiber-studio-release-macos-aarch64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - run: bun run fetch-fnn -- --triple x86_64-apple-darwin

      - run: bun run tauri build -- --target x86_64-apple-darwin

      - name: Upload macOS bundles (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: fiber-studio-release-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - run: bun run fetch-fnn -- --triple x86_64-pc-windows-msvc

      - run: bun run tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: fiber-studio-release-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile

      - run: bun run fetch-fnn -- --triple x86_64-unknown-linux-gnu

      - run: bun run tauri build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: fiber-studio-release-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  publish:
    needs: [build-macos, build-macos-intel, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: fiber-studio-release-*
          path: installers
          merge-multiple: true

      - name: Stage release assets
        run: |
          mkdir -p upload
          find installers -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
            \) -exec cp -v {} upload/ \;
          echo "Staged:"
          ls -la upload
          count="$(find upload -type f | wc -l | tr -d ' ')"
          if [ "$count" -lt 1 ]; then
            echo "No installer files found to publish."
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fiber Studio ${{ github.ref_name }} (M1 dev build)
          prerelease: ${{ github.ref_name != 'v1.0.0' }}
          body: |
            ## Fiber Studio ${{ github.ref_name }} — Milestone 1 dev build

            **Unsigned pre-release for testers.** Wallet, Channels, Network, and Settings are placeholders; M2 will add those flows.

            ### What's included (M1)
            - Guided first-time setup (testnet/mainnet, relays, key file, password)
            - Start/stop node and view logs
            - Home dashboard (balance, channels, peers, relay status, recent activity)
            - Official fnn v0.8.1 bundled as a sidecar

            ### Install notes
            - **macOS:** Right-click the app → Open if Gatekeeper blocks an unsigned build.
            - **Windows:** SmartScreen may warn — choose "More info" → "Run anyway".
            - **Linux:** AppImage may need `chmod +x`; `.deb` / `.rpm` also attached.

            Developers can still clone the repo and run `bun run tauri dev`.
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
