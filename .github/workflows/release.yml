# Build signed updater artifacts and publish a GitHub Release on tag push.
#
# Setup (once):
#   1. Generate keys locally:
#        CI=true bun tauri signer generate -w src-tauri/.updater/fiber-studio.key -f --password=""
#   2. Public key is already in src-tauri/tauri.conf.json (safe to commit).
#   3. Add GitHub repo secret TAURI_SIGNING_PRIVATE_KEY with the private key file contents.
#
# Release:
#   1. Bump version in package.json, src-tauri/tauri.conf.json, src-tauri/Cargo.toml.
#   2. Commit and push to main.
#   3. git tag v0.1.0 && git push origin v0.1.0
#
# tauri-action uploads installers, updater bundles, and latest.json.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            fnn_triple: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            release_asset_name_pattern: Fiber-Studio-[version]-macOS-Apple-Silicon-[bundle][ext]
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            fnn_triple: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            release_asset_name_pattern: Fiber-Studio-[version]-macOS-Intel-[bundle][ext]
          - platform: ubuntu-22.04
            args: ""
            fnn_triple: x86_64-unknown-linux-gnu
            rust_target: ""
            release_asset_name_pattern: Fiber-Studio-[version]-Linux-x64-[bundle][ext]
          - platform: ubuntu-22.04-arm
            args: ""
            fnn_triple: aarch64-unknown-linux-gnu
            rust_target: ""
            release_asset_name_pattern: Fiber-Studio-[version]-Linux-ARM64-[bundle][ext]
          - platform: windows-latest
            args: ""
            fnn_triple: x86_64-pc-windows-msvc
            rust_target: ""
            release_asset_name_pattern: Fiber-Studio-[version]-Windows-x64-[bundle][setup][ext]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf \
            rpm \
            file \
            xdg-utils

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: v1-rust-${{ matrix.fnn_triple }}

      - run: bun install --frozen-lockfile

      - name: Fetch fnn sidecar binary
        run: bun run fetch-fnn -- --triple ${{ matrix.fnn_triple }}

      - name: Verify updater signing secret
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add the contents of src-tauri/.updater/fiber-studio.key as a repository secret. See README → Releases and updates."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fiber Studio ${{ github.ref_name }}
          # Must stay false while the updater endpoint uses releases/latest/download/latest.json.
          # GitHub excludes prereleases from "latest", which breaks in-app update checks.
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: false
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: ${{ matrix.release_asset_name_pattern }}
          releaseBody: |
            ## Fiber Studio ${{ github.ref_name }}

            **Unsigned app installers with signed in-app updates.** Wallet, Channels, and Network flows continue in M2.

            ### Install

            Download the **`-dmg`**, **`-nsis-setup.exe`**, **`-msi`**, **`-appimage`**, **`-deb`**, or **`-rpm`** file for your platform. Ignore `latest.json` and files ending in `-app.app.tar.gz` — those are for in-app updates.

            | Platform | Example filename |
            |----------|------------------|
            | macOS (Apple Silicon) | `Fiber-Studio-*-macOS-Apple-Silicon-dmg.dmg` |
            | macOS (Intel) | `Fiber-Studio-*-macOS-Intel-dmg.dmg` |
            | Windows | `Fiber-Studio-*-Windows-x64-nsis-setup.exe` or `...-msi.msi` |
            | Linux x64 | `Fiber-Studio-*-Linux-x64-appimage.AppImage` (or `-deb.deb` / `-rpm.rpm`) |
            | Linux ARM64 | `Fiber-Studio-*-Linux-ARM64-appimage.AppImage` (or `-deb.deb` / `-rpm.rpm`) |

            - **macOS:** open the `.dmg`, drag Fiber Studio to Applications. If Gatekeeper blocks launch, use **System Settings → Privacy & Security → Open Anyway** (see the repo README).
            - **Windows:** run the NSIS setup or MSI. If SmartScreen warns, choose **More info → Run anyway**.
            - **Linux:** AppImage — `chmod +x` then run. Debian/Ubuntu — `sudo apt install ./Fiber-Studio-*-deb.deb`. Fedora/RHEL — `sudo dnf install ./Fiber-Studio-*-rpm.rpm`.

            ### In-app updates
            Installed copies check GitHub Releases for updates automatically on launch. You can also use **Settings → Updates**.

            ### M1 scope
            - Guided setup, node start/stop, logs, home dashboard
            - Official fnn v0.8.1 bundled locally
          args: ${{ matrix.args }}
